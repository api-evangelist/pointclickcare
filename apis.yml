apis:
- aid: pointclickcare:pointclickcare-ehr-api
  name: PointClickCare Long-Term Care EHR API
  tags:
  - Healthcare
  - Long-Term Care
  - EHR
  - Senior Care
  - REST
  image: https://raw.githubusercontent.com/api-evangelist/pointclickcare/refs/heads/main/image.png
  humanURL: https://developer.pointclickcare.com/spa
  baseURL: https://api.pointclickcare.com
  properties:
  - url: https://developer.pointclickcare.com/spa
    type: Documentation
  - url: https://developer.pointclickcare.com/spa
    type: Portal
  description: >-
    PointClickCare provides EHR and care coordination APIs for long-term and post-acute care facilities. APIs enable access to resident records, medication administration, clinical assessments, and care plan data for skilled nursing facilities and senior living communities.

- aid: pointclickcare:pointclickcare-fhir-api
  name: PointClickCare FHIR API
  tags:
  - Healthcare
  - Long-Term Care
  - FHIR
  - HL7
  - Interoperability
  - REST
  image: https://raw.githubusercontent.com/api-evangelist/pointclickcare/refs/heads/main/image.png
  humanURL: https://developer.pointclickcare.com/spa
  baseURL: https://api.pointclickcare.com
  properties:
  - url: https://developer.pointclickcare.com/spa
    type: Documentation
  description: >-
    PointClickCare FHIR API provides HL7 FHIR-compliant access to resident clinical data for post-acute and long-term care settings, supporting interoperability with other healthcare systems and care coordination platforms.

